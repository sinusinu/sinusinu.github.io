<!DOCTYPE html>
<html>
    <head>
        <title>시누의 미니게임 모음집</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="시누의 미니게임 모음집" />
        <meta property="og:description" content="3분 이상 하면 재미없음" />
        <meta property="og:type" content="website" />
        <meta property="og:image" itemprop="image" content="https://sinusinu.github.io/og_image.png">
        <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16162c">
        <link rel="apple-touch-icon-precomposed" href="https://sinusinu.github.io/favicon57.png">
        <link rel="icon" href="https://sinusinu.github.io/favicon32.png">
        <link rel="stylesheet" href="../common.css">
        <style>
            body {
                margin: 16px;
                text-align: center;
                user-select: none;
            }
            .index-title {
                font-size: 24px;
            }
            .index-subtitle {
                font-size: 18px;
            }
            .index-table {
                table-layout: fixed;
                border-collapse: separate;
                border: 3px solid rgb(48, 48, 94);
                background-color: rgb(48, 48, 94);
                margin-left: auto;
                margin-right: auto;
                margin-top: 16px;
                font-size: 14px;
            }
            .index-table td {
                border: 3px solid rgb(48, 48, 94);
            }
            .index-table a {
                text-decoration: none;
            }
            .item-thumb {
                width: 140px;
            }
            .copyright {
                text-align: right;
                position: absolute;
                bottom: 16px;
                right: 16px;
                color: rgb(64, 64, 124);
                z-index: 1;
            }
            .copyright a {
                color: rgb(64, 64, 124);
            }
        </style>
    </head>
    <body>
        <div class="index-title">시누의 미니게임 모음집</div>
        <div class="index-subtitle"><a href="https://github.com/sinusinu/sinusinu.github.io/blob/main/minigames/README.md">이게뭐에요</a> ∣ <a href="https://github.com/sinusinu/sinusinu.github.io/minigames/">소스코드</a></div>
        <div id="index-menu-container"></div>
        <div class="copyright"><a href="privacy.html">개인정보처리방침</a> / © 2022 sinu</div>
        <script>
            var menuPortrait = `
<table class="index-table">
    <tr>
        <td><a href="../index.html"><img class="item-thumb" src="../thumbnails/index.png"><br/>돌아가기</a></td>
    </tr>
</table>
            `;
            var menuLandscape = `
<table class="index-table">
    <tr>
        <td><a href="../index.html"><img class="item-thumb" src="../thumbnails/index.png"><br/>돌아가기</a></td>
    </tr>
</table>
            `;
            var dir = 'portrait';

            var menuContainer = document.getElementById("index-menu-container");

            // window resize handler
            var checkScreenOrientation = function() {
                var vpWidth = window.innerWidth;
                var vpHeight = window.innerHeight;

                var newDir = '';

                if (vpWidth > vpHeight) newDir = 'landscape';
                else newDir = 'portrait';

                if (dir !== newDir) {
                    dir = newDir;
                    populateMenu();
                }
            };

            var populateMenu = function() {
                menuContainer.innerHTML = (dir === 'portrait') ? menuPortrait : menuLandscape;
            }

            // optimized resize event
            // https://developer.mozilla.org/ko/docs/Web/API/Window/resize_event#requestanimationframe_customevent (minimized)
            !function(e,n,i){i=i||window;var t=!1;i.addEventListener(e,function(){t||(t=!0,requestAnimationFrame(function(){i.dispatchEvent(new CustomEvent(n)),t=!1}))})}("resize","optimizedResize");
            window.addEventListener("optimizedResize", checkScreenOrientation);

            checkScreenOrientation();
        </script>
    </body>
</html>
